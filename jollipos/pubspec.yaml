name: jollipos
description: "JolliPOS — a touch-first fast-food Point of Sale for tablet and mobile."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management + DI
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.7

  # Models / immutability / serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Local DB (offline-first)
  drift: ^2.19.1
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0

  # Connectivity + sync
  connectivity_plus: ^6.0.5

  # Receipt / thermal printer (abstracted; stubbed when no hardware)
  esc_pos_utils_plus: ^2.0.4

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1
  collection: ^1.18.0
  shared_preferences: ^2.3.2
  crypto: ^3.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Code generation
  build_runner: ^2.4.12
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  drift_dev: ^2.19.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
